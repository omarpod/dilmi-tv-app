name: بناء تطبيق Dilmi TV (Android APK)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: تحميل الكود
        uses: actions/checkout@v4

      # 2) تثبيت Java 11 (أكثر توافقاً مع Gradle في المشاريع)
      - name: تثبيت Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '11'

      # 3) تثبيت Flutter SDK
      - name: تثبيت Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.3'
          channel: 'stable'
          cache: true

      # 4) تحديث Gradle Wrapper لضمان التوافق
      - name: تحديث Gradle Wrapper
        run: cd android && ./gradlew wrapper --gradle-version 7.6

      # 5) تثبيت الحزم
      - name: تثبيت الحزم
        run: flutter pub get

      # 6) تنظيف المشروع (ضروري لتجنب تضارب الملفات)
      - name: تنظيف المشروع
        run: flutter clean

      # 7) توليد أيقونة التطبيق
      - name: توليد أيقونة التطبيق
        run: flutter pub run flutter_launcher_icons

      # 8) بناء ملف APK
      - name: بناء APK
        run: flutter build apk --release

      # 9) رفع ملف APK
      - name: رفع ملف APK كمخرجات
        uses: actions/upload-artifact@v4
        with:
          name: dilmi-tv-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk