name: بناء تطبيق Dilmi TV (Android APK)

# متى يعمل هذا الملف تلقائياً:
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: # يسمح أيضاً بتشغيله يدوياً من تبويب Actions في GitHub

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      # 1) تحميل نسخة من الكود داخل بيئة GitHub
      - name: تحميل الكود
        uses: actions/checkout@v4

      # 2) تثبيت Java (مطلوبة لبناء تطبيقات أندرويد)
      - name: تثبيت Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3) تثبيت Flutter SDK
      - name: تثبيت Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      # 4) تحميل مكتبات المشروع (نفس ما يفعله flutter pub get محلياً)
      - name: تثبيت الحزم
        run: flutter pub get

      # 5) توليد أيقونة التطبيق من الصورة الموجودة في assets/icon/
      - name: توليد أيقونة التطبيق
        run: flutter pub run flutter_launcher_icons

      # 7) بناء ملف APK نهائي وجاهز للتثبيت
      - name: بناء APK
        run: flutter build apk --release

      # 8) رفع ملف APK الناتج كمرفق يمكن تحميله من صفحة الـ Action نفسها
      - name: رفع ملف APK كمخرجات
        uses: actions/upload-artifact@v4
        with:
          name: dilmi-tv-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk