name: بناء تطبيق Dilmi TV (Android AAB)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: تحميل الكود
        uses: actions/checkout@v4

      - name: تثبيت Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: تثبيت Flutter 3.22.3
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.3'
          channel: 'stable'

      # الخدعة هنا: حذف أي ملفات أندرويد قديمة تسبب التعارض
      - name: حذف ملفات الأندرويد القديمة والتهيئة
        run: |
          rm -rf android
          flutter create --project-name dilmi_tv_app .

      - name: تثبيت الحزم
        run: flutter pub get

      - name: بناء App Bundle
        run: flutter build appbundle --release

      - name: رفع الملف
        uses: actions/upload-artifact@v4
        with:
          name: dilmi-tv-release-aab
          path: build/app/outputs/bundle/release/app-release.aab