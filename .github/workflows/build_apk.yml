name: بناء تطبيق Dilmi TV (Android AAB)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: تحميل الكود
        uses: actions/checkout@v4

      - name: تثبيت Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # استخدام إصدار أقدم من Flutter لتجنب خطأ الـ Groovy
      - name: تثبيت Flutter 3.10.6
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.10.6'
          channel: 'stable'

      - name: تثبيت الحزم
        run: flutter pub get

      - name: تنظيف المشروع
        run: flutter clean

      - name: بناء App Bundle
        run: flutter build appbundle --release

      - name: رفع الملف
        uses: actions/upload-artifact@v4
        with:
          name: dilmi-tv-release-aab
          path: build/app/outputs/bundle/release/app-release.aab